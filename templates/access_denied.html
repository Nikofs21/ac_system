{% extends 'base.html' %}
{% block title %}Acceso denegado{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - var(--ni-topbar-h)); display:flex; align-items:center; justify-content:center; padding:24px;">
  <div style="max-width:400px; text-align:center;">
    <div style="width:64px; height:64px; border-radius:50%; background:#fce8e8; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
      <i class="ti ti-lock" style="font-size:28px; color:#c0392b;" aria-hidden="true"></i>
    </div>
    <h1 style="font-size:20px; font-weight:600; color:var(--ni-dark); margin-bottom:8px;">Acceso denegado</h1>
    <p style="font-size:14px; color:var(--ni-text-sub); margin-bottom:24px; line-height:1.6;">
      No tienes permiso para acceder a esta seccion.<br>
      Si crees que esto es un error, contacta al administrador de la obra.
    </p>
    <a href="{% url 'dashboard' %}" class="ni-btn ni-btn-primary" style="width:auto; display:inline-flex; padding:10px 24px;">
      <i class="ti ti-arrow-left" aria-hidden="true"></i> Volver al inicio
    </a>
  </div>
</div>
{% endblock %}
