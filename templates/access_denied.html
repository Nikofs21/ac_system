{% extends 'base.html' %}
{% block title %}Acceso denegado{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - var(--ac-topbar-h)); display:flex; align-items:center; justify-content:center; padding:24px;">
  <div style="max-width:400px; text-align:center;">
    <div style="width:64px; height:64px; border-radius:50%; background:var(--ac-danger-bg); display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
      <i class="ti ti-lock" style="font-size:28px; color:var(--ac-danger);" aria-hidden="true"></i>
    </div>
    <h1 style="font-size:20px; font-weight:700; color:var(--ac-dark); margin-bottom:8px;">Acceso denegado</h1>
    <p style="font-size:14px; color:var(--ac-text-sub); margin-bottom:24px; line-height:1.6;">
      No tienes permiso para acceder a esta seccion.<br>
      Si crees que esto es un error, contacta al administrador de la obra.
    </p>
    <a href="{% url 'dashboard' %}" class="ac-btn ac-btn-primary">
      <i class="ti ti-arrow-left" aria-hidden="true"></i> Volver al inicio
    </a>
  </div>
</div>
{% endblock %}
