{% if messages %}
  <div class="ac-messages" id="ac-messages">
    {% for message in messages %}
      <div class="ac-msg ac-msg-{{ message.tags }}">
        {% if message.tags == 'success' %}
          <i class="ti ti-circle-check" aria-hidden="true"></i>
        {% elif message.tags == 'error' %}
          <i class="ti ti-circle-x" aria-hidden="true"></i>
        {% elif message.tags == 'warning' %}
          <i class="ti ti-alert-triangle" aria-hidden="true"></i>
        {% else %}
          <i class="ti ti-info-circle" aria-hidden="true"></i>
        {% endif %}
        <span>{{ message }}</span>
        <button type="button" class="ac-msg-close" aria-label="Cerrar" onclick="this.parentElement.remove()">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
    {% endfor %}
  </div>
  <script>
    document.querySelectorAll('#ac-messages .ac-msg').forEach(function(el){
      el.addEventListener('animationend', function(e){
        if (e.animationName === 'ac-msg-out') el.remove();
      });
    });
  </script>
{% endif %}
