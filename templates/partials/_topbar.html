<header class="ac-topbar">
  <a href="{% url 'dashboard' %}" class="ac-brand">
    <svg width="26" height="26" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="4" y="4" width="28" height="4" rx="2" fill="#4a6fff"/>
      <rect x="6" y="10" width="3" height="18" rx="1.5" fill="#4a6fff"/>
      <rect x="11" y="10" width="3" height="18" rx="1.5" fill="#4a6fff"/>
      <rect x="16" y="10" width="3" height="18" rx="1.5" fill="#4a6fff"/>
      <rect x="21" y="10" width="3" height="18" rx="1.5" fill="#4a6fff"/>
      <rect x="26" y="10" width="3" height="18" rx="1.5" fill="#4a6fff"/>
      <rect x="2" y="28" width="32" height="4" rx="2" fill="#4a6fff"/>
    </svg>
    <div>
      <div class="ac-brand-name">NOVUS IMPERIUM</div>
      <div class="ac-brand-sub">Control de Partidas A&C</div>
    </div>
  </a>

  <div class="ac-topbar-right">
    {% if active_site %}
      <a href="{% url 'change_site' %}" class="ac-obra-tag">
        <i class="ti ti-building" style="font-size:13px;"></i>
        <span>
          <span style="font-weight:600; font-size:12px;">{{ active_site.name }}</span>
          <span style="opacity:0.55; font-size:10px; margin-left:5px;">{{ active_site.code }}</span>
        </span>
        <i class="ti ti-chevron-down" style="font-size:10px; opacity:0.6;"></i>
      </a>
    {% endif %}

    <div>
      <div class="ac-user-name">{{ user.get_full_name }}</div>
      <div class="ac-user-role">{% if active_site_membership %}{{ active_site_membership.role.name }}{% endif %}</div>
    </div>

    <div class="ac-avatar">{{ user.first_name|first|upper }}{{ user.last_name|first|upper }}</div>
  </div>
</header>
