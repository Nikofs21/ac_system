{% extends 'base.html' %}
{% block title %}Obra incorrecta{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - var(--ni-topbar-h)); display:flex; align-items:center; justify-content:center; padding:24px;">
  <div style="max-width:380px; text-align:center;">
    <div style="width:64px; height:64px; border-radius:50%; background:#fce8e8; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
      <i class="ti ti-building-off" style="font-size:28px; color:#c0392b;" aria-hidden="true"></i>
    </div>
    <h1 style="font-size:18px; font-weight:600; color:var(--ni-dark); margin-bottom:8px;">Obra incorrecta</h1>
    <p style="font-size:14px; color:var(--ni-text-sub); margin-bottom:6px;">
      <strong>{{ resource.display_name }}</strong>
    </p>
    <p style="font-size:13px; color:var(--ni-text-sub); margin-bottom:24px; line-height:1.6;">
      Este QR pertenece a otra empresa. Tu obra activa es <strong>{{ site.name }}</strong>.
      Cambia de obra si corresponde.
    </p>
    <a href="{% url 'change_site' %}" class="ni-btn ni-btn-primary" style="width:auto; display:inline-flex; padding:10px 24px;">
      <i class="ti ti-building" aria-hidden="true"></i> Cambiar obra
    </a>
  </div>
</div>
{% endblock %}
